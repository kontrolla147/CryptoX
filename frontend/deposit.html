<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/deposit.css">
</head>

<body>

<div class="menu-toggle" onclick="toggleSidebar()">☰</div>

    <div class="layout">
      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <h2 class="logo">CryptoX</h2>

        <a href="dashboard.html" >
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a href="deposit.html"class="active">
          <i class="fas fa-wallet"></i>
          <span>Deposit</span>
        </a>

        <a href="withdraw.html">
          <i class="fas fa-arrow-up-right-from-square"></i>
          <span>Withdraw</span>
        </a>

        <a href="transactions.html">
          <i class="fas fa-list"></i>
          <span>Transactions</span>
        </a>

        <a href="#">
          <i class="fas fa-users"></i>
          <span>Referrals</span>
        </a>

        <button onclick="logout()">
          <i class="fas fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
      <!-- MAIN -->

      <div class="main">

  <h2>Deposit Funds</h2>
  <p class="subtitle">Send crypto to the address below and confirm your deposit</p>

  <!-- WALLET CARDS -->
  <div class="crypto-grid">

    <div class="crypto-card deposit">
      <h3>🟡 Bitcoin (BTC)</h3>
      <p id="btcWallet">Not set</p>
      <button onclick="copyText('btcWallet')">Copy Address</button>
    </div>

    <div class="crypto-card deposit">
      <h3>🔵 Ethereum (ETH)</h3>
      <p id="ethWallet">Not set</p>
      <button onclick="copyText('ethWallet')">Copy Address</button>
    </div>

    <div class="crypto-card deposit">
      <h3>🟢 USDT (TRC20)</h3>
      <p id="usdtWallet">Not set</p>
      <button onclick="copyText('usdtWallet')">Copy Address</button>
    </div>

  </div>

  <!-- ACTION BOX -->
  <div class="action-box">
    <h3>Confirm Deposit</h3>

    <input id="amount" type="number" placeholder="Enter amount sent">

    <button class="primary-btn" onclick="submitDeposit()">
      I Have Sent Payment
    </button>
  </div>

</div>

<script src="js/deposit.js"></script>
</body>
</html>
