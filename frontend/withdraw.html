<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw</title>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/deposit.css">
</head>

<body>

<div class="menu-toggle" onclick="toggleSidebar()">☰</div>

    <div class="layout">
      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <h2 class="logo">CryptoX</h2>

        <a href="dashboard.html" >
          <i class="fas fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a href="deposit.html">
          <i class="fas fa-wallet"></i>
          <span>Deposit</span>
        </a>

        <a href="withdraw.html"class="active">
          <i class="fas fa-arrow-up-right-from-square"></i>
          <span>Withdraw</span>
        </a>

        <a href="transactions.html">
          <i class="fas fa-list"></i>
          <span>Transactions</span>
        </a>

        <a href="#">
          <i class="fas fa-users"></i>
          <span>Referrals</span>
        </a>

        <button onclick="logout()">
          <i class="fas fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
      <!-- MAIN -->

      <div class="main">

  <h2>Withdraw Funds</h2>
  <p class="subtitle">Transfer your funds securely to your external wallet</p>

  <div class="action-box">

    <label>Amount</label>
    <input id="amount" type="number" placeholder="Enter amount">

    <label>Wallet Address</label>
    <input id="address" placeholder="Enter wallet address">

    <label>Select Network</label>
    <select id="coin">
      <option value="btc">Bitcoin (BTC)</option>
      <option value="eth">Ethereum (ETH)</option>
      <option value="usdt">USDT (TRC20)</option>
    </select>

    <button class="primary-btn" onclick="submitWithdraw()">
      Request Withdrawal
    </button>

  </div>

</div>

<script src="js/withdraw.js"></script>
</body>
</html>
